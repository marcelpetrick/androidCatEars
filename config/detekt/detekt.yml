build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: true

style:
  active: true
  MagicNumber:
    active: true
    # Keep detekt's default test-source excludes, and add the theme palette:
    # Color.kt is a table of ARGB literals by definition, so naming each hex
    # value adds noise without meaning.
    excludes: ['**/test/**', '**/androidTest/**', '**/*.kts', '**/ui/theme/Color.kt',
               '**/overlay/CatEarOverlay.kt', '**/capture/OverlayCompositor.kt']
    ignoreAnnotated:
      - Composable
      - Preview
  MaxLineLength:
    active: true
    maxLineLength: 120
  UnusedPrivateMember:
    active: true
    # @Preview functions are invoked by the Android Studio preview system, not by app code
    ignoreAnnotated:
      - Preview

naming:
  active: true
  FunctionNaming:
    active: true
    # Composable functions follow PascalCase — ignore the camelCase naming rule for them
    ignoreAnnotated:
      - Composable

complexity:
  active: true
  LongParameterList:
    active: true
    ignoreDefaultParameters: true
    ignoreAnnotated:
      - Composable
  TooManyFunctions:
    active: true
    # Renderer files and test classes legitimately have many functions.
    excludes: ['**/overlay/CatEarOverlay.kt', '**/capture/OverlayCompositor.kt',
               '**/test/**', '**/androidTest/**']
