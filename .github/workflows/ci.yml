#
# CI pipeline — mirrors the local quality gate exactly.
# Steps: build → format check → static analysis → lint → unit tests → coverage.

name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-verify:
    name: Build & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (debug)
        run: ./gradlew assembleDebug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Format check (Spotless)
        run: ./gradlew spotlessCheck

      - name: Static analysis (detekt)
        run: ./gradlew detekt

      - name: Android Lint
        run: ./gradlew :app:lint

      - name: Unit tests
        run: ./gradlew :app:test

      - name: Coverage gate (Kover ≥ 95%)
        run: ./gradlew :app:koverVerify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/kover/html/

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
