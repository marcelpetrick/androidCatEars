#
# Manual release pipeline.
# Trigger from the GitHub UI (Actions → Release → Run workflow). It reads the
# version from version.properties, builds the installable debug APK and the
# release AAB, and publishes a GitHub Release tagged v<version> with both
# artefacts attached, so a user can download and install the APK directly.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read version
        id: version
        run: |
          MAJOR=$(grep '^major=' version.properties | cut -d= -f2)
          MINOR=$(grep '^minor=' version.properties | cut -d= -f2)
          PATCH=$(grep '^patch=' version.properties | cut -d= -f2)
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version ${VERSION}"

      - name: Run quality gate
        run: ./gradlew spotlessCheck detekt :app:lint :app:test :app:koverVerify

      - name: Build installable debug APK
        run: ./gradlew assembleDebug

      - name: Build release bundle (AAB)
        run: ./gradlew bundleRelease

      - name: Stage release artefacts
        run: |
          mkdir -p release-artefacts
          cp app/build/outputs/apk/debug/androidCatEars-debug.apk \
             "release-artefacts/androidCatEars-${{ steps.version.outputs.version }}-debug.apk"
          cp app/build/outputs/bundle/release/androidCatEars-release.aab \
             "release-artefacts/androidCatEars-${{ steps.version.outputs.version }}-release.aab"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: androidCatEars ${{ steps.version.outputs.version }}
          body: |
            ## androidCatEars ${{ steps.version.outputs.version }}

            Real-time cat-ear camera overlay for Android (API 34+).

            ### Downloads
            - **androidCatEars-${{ steps.version.outputs.version }}-debug.apk** — install directly on
              an Android 14+ device (debug-signed).
            - **androidCatEars-${{ steps.version.outputs.version }}-release.aab** — app bundle for
              Play Store distribution (unsigned until release signing is configured).

            Version: `${{ steps.version.outputs.version }}`
          files: |
            release-artefacts/androidCatEars-${{ steps.version.outputs.version }}-debug.apk
            release-artefacts/androidCatEars-${{ steps.version.outputs.version }}-release.aab
          generate_release_notes: true
